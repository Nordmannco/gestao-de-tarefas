    (depOpts?'<div class="select-wrap" style="margin-bottom:8px"><select class="form-select" id="sf-dep-'+sf.id+'" style="height:32px;font-size:12px"><option value="">Sem dependência</option>'+depOpts+'</select></div>':'')+
    '<textarea class="form-textarea" id="sf-note-'+sf.id+'" placeholder="Observação (opcional)" style="min-height:34px;font-size:11px" oninput="autoResize(this)"></textarea>'+
  '</div>';
}

function removeSubForm(id) {
  subForms = subForms.filter(s=>s.id!==id);
  document.getElementById('sf-'+id)?.remove();
}

function addNewCanal() {
  const inp = document.getElementById('f-canal-novo');
  const val = inp?.value?.trim();
  if (!val) return;
  const container = document.getElementById('multi-canais');
  if (!container) return;
  // Check if already exists
  if ([...container.querySelectorAll('.multi-item')].some(el=>el.textContent===val)) { inp.value=''; return; }
  const el = document.createElement('div');
  el.className = 'multi-item selected';
  el.setAttribute('data-canal', val);
  el.onclick = function(){ this.classList.toggle('selected'); };
  el.textContent = val;
  container.insertBefore(el, container.querySelector('+ div') || null);
  container.appendChild(el);
  inp.value = '';
}

function saveCampaign() {
  const name = document.getElementById('f-name')?.value?.trim();
  if (!name) { _saving = false; alert('Insira o nome da campanha'); return; }

  const participants = [...document.querySelectorAll('#multi-participants .multi-item.selected')].map(el=>el.dataset.val);
  const canais = [...document.querySelectorAll('#multi-canais .multi-item.selected')].map(el=>el.dataset.canal||el.textContent);

  // Collect subtasks — from template or from manual subForms
  let subs = [];
  if (currentTemplate && tplData) {
    // Para template 'campanhas': NÃO criar subtarefas agora
    // applyStatusRules cuida disso conforme o status muda
    if (currentTemplate === 'campanhas') {
      subs = []; // começa vazio — briefing task será criada por applyStatusRules
    }
    // For email MKT: auto subtasks
    if (currentTemplate === 'email') {
      const giovana = MEMBERS.find(m=>m.name.toLowerCase().includes('giovana'));
      const bia     = MEMBERS.find(m=>m.name.toLowerCase().includes('bia'));
      const bannerSub = {id:uid(),title:'Banner do e-mail',canal:'E-mail',urgency:'Normal',
        owner:giovana?.id||'',due:'',dep:null,note:'',status:'Pendente',checklist:[]};
      const enviaSub  = {id:uid(),title:'Envio do e-mail',canal:'E-mail',urgency:'Normal',
        owner:bia?.id||'',due:'',dep:bannerSub.id,note:'',status:'Pendente',checklist:[]};
      subs = [bannerSub, enviaSub];
    }
  } else {
    subs = subForms.map(sf=>({
      id:sf.id,
      title:document.getElementById('sf-title-'+sf.id)?.value?.trim()||'Subtarefa',
      canal:document.getElementById('sf-canal-'+sf.id)?.value||'Geral',
      urgency:document.getElementById('sf-urg-'+sf.id)?.value||'Normal',
      owner:document.getElementById('sf-owner-'+sf.id)?.value||'',
      due:document.getElementById('sf-due-'+sf.id)?.value||'',
      dep:document.getElementById('sf-dep-'+sf.id)?.value||null,
      note:document.getElementById('sf-note-'+sf.id)?.value?.trim()||'',
      status:'Pendente', checklist:[],
    }));
  }

  campaigns.push({
    id:cuid(), name,
    type:document.getElementById('f-type').value,
    status:document.getElementById('f-status').value,
    startDate:document.getElementById('f-start').value,
    endDate:document.getElementById('f-end').value,
    endTime:document.getElementById('f-end-time')?.value||'',
    owner:document.getElementById('f-owner').value,
    participants: participants.length ? participants : [document.getElementById('f-owner').value],
    canais: canais,
    driveLink:document.getElementById('f-drive')?.value?.trim()||'',
    description:document.getElementById('f-desc')?.value?.trim()||'',
    subtasks:subs, comments:[],
    templateType: currentTemplate||null,
    templateData: currentTemplate ? JSON.parse(JSON.stringify(tplData)) : null,
  });
  subForms=[]; currentTemplate=null; tplData={};
  const newCamp = campaigns[campaigns.length-1];
  applyStatusRules(newCamp, null, newCamp.status);
  saveData();
  // Renderiza ANTES de fechar para evitar flicker
  renderKanban();
  if (currentView==='personal') renderPersonal();
  if (currentView==='overview') renderOverview();
  closePanel();
  showToast('Campanha criada','#3ecf8e');
}

/* PERSONAL PANEL */
function renderPersonalFilters() {
  const bar = document.getElementById('personal-filter-bar');
  if (!bar) return;

  function ddBtn(label, key, vals, allVals, colorFn) {
    const hasVal = vals.length > 0;
    const labelText = hasVal ? vals.slice(0,2).join(', ')+(vals.length>2?'…':'') : label;
    const id = 'dd-'+key;
    const items = allVals.map(v => {
      const on = vals.includes(v);
      const style = colorFn&&on ? 'color:'+colorFn(v).color+';background:'+colorFn(v).bg : '';
      return '<div class="filter-dd-item'+(on?' sel':'')+'" style="'+style+'" onclick="togglePF(\''+key+'\',\''+v+'\')">'+v+'</div>';
    }).join('');
    return '<div class="filter-dd">'+
      '<button class="filter-dd-btn'+(hasVal?' has-value':'')+'" onclick="toggleDD(\''+id+'\')">'+labelText+' ▾</button>'+
      '<div class="filter-dd-list" id="'+id+'">'+items+
        '<div class="filter-dd-clear" onclick="clearPF(\''+key+'\')">Limpar</div>'+
      '</div></div>';
  }

  bar.innerHTML =
    ddBtn('Prioridade','urgency',personalFilter.urgency,URGENCIAS,u=>URG_COLOR[u]) +
    ddBtn('Prazo','period',personalFilter.period?[personalFilter.period]:[],['Hoje','Amanhã','Essa semana'],null) +
    ddBtn('Tipo','tipo',personalFilter.tipo,TYPES,null) +
    ddBtn('Canal','canal',personalFilter.canal,CANAIS,null) +
    ((personalFilter.urgency.length||personalFilter.canal.length||personalFilter.tipo.length||personalFilter.period)?
      '<button class="btn-clear-all" onclick="clearAllPF()">× Limpar tudo</button>':'');
}

function toggleDD(id) {
  document.querySelectorAll('.filter-dd-list').forEach(el=>{ if(el.id!==id) el.classList.remove('open'); });
  document.getElementById(id)?.classList.toggle('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.filter-dd')) document.querySelectorAll('.filter-dd-list').forEach(el=>el.classList.remove('open'));
});

function togglePF(key, val) {
  if (key==='period') { personalFilter.period = personalFilter.period===val?null:val; }
  else {
    const arr = personalFilter[key];
    const idx = arr.indexOf(val);
    if (idx===-1) arr.push(val); else arr.splice(idx,1);
  }
  renderPersonalFilters(); renderPersonal();
}

function clearPF(key) {
  if (key==='period') personalFilter.period=null; else personalFilter[key]=[];
  renderPersonalFilters(); renderPersonal();
}

function clearAllPF() {
  personalFilter={urgency:[],canal:[],tipo:[],period:null};
  renderPersonalFilters(); renderPersonal();
}

function renderPersonal() {
  if (!currentMember) return;
  const m = getMember(currentMember);
  if (!m) return;

  // Header
  const av = document.getElementById('personal-avatar');
  av.style.background = m.color;
  if (m.avatar) { av.innerHTML='<img src="'+m.avatar+'" style="width:100%;height:100%;object-fit:cover">'; }
  else { av.textContent=m.initials; av.style.color='#fff'; }
  document.getElementById('personal-name').textContent=m.name;
  document.getElementById('personal-role').textContent=m.role;

  const search = document.getElementById('personal-search')?.value?.toLowerCase()||'';
  const now = new Date();

  // Collect tasks
  let tasks = [];
  campaigns.forEach(c => {
    (c.subtasks||[]).forEach(s => {
      if (s.owner !== currentMember) return;
      // Tarefas de checklist (_auto='checklist') só aparecem quando a campanha está Em andamento ou além
      if (s._auto === 'checklist' && c.status === 'Em planejamento') return;
      tasks.push({sub:s, campaign:c});
    });
  });

  // Apply filters
  if (personalFilter.urgency.length) tasks=tasks.filter(t=>personalFilter.urgency.includes(t.sub.urgency));
  if (personalFilter.canal.length)   tasks=tasks.filter(t=>personalFilter.canal.includes(t.sub.canal));
  if (personalFilter.tipo.length)    tasks=tasks.filter(t=>personalFilter.tipo.includes(t.campaign.type));
  if (personalFilter.period==='Hoje') {
    tasks=tasks.filter(t=>t.sub.due&&new Date(t.sub.due).toDateString()===now.toDateString());
  } else if (personalFilter.period==='Amanhã') {
    const tom=new Date(now); tom.setDate(tom.getDate()+1);
    tasks=tasks.filter(t=>t.sub.due&&new Date(t.sub.due).toDateString()===tom.toDateString());
  } else if (personalFilter.period==='Essa semana') {
    const s0=new Date(now); s0.setHours(0,0,0,0); s0.setDate(now.getDate()-now.getDay());
    const s1=new Date(s0); s1.setDate(s0.getDate()+7);
    tasks=tasks.filter(t=>t.sub.due&&new Date(t.sub.due)>=s0&&new Date(t.sub.due)<=s1);
  }
  if (search) tasks=tasks.filter(t=>t.sub.title.toLowerCase().includes(search)||t.campaign.name.toLowerCase().includes(search));

  const done=tasks.filter(t=>t.sub.status==='Concluído');
  const pending=tasks.filter(t=>t.sub.status!=='Concluído');
  const late=pending.filter(t=>isLate(t.sub));

  // Stats
  document.getElementById('personal-stats').innerHTML=
    '<div class="stat-chip"><span class="stat-num">'+pending.length+'</span> pendentes</div>'+
    (late.length?'<div class="stat-chip" style="border-color:var(--u-urgente);color:var(--u-urgente)"><span class="stat-num">'+late.length+'</span> atrasadas</div>':'')+
    '<div class="stat-chip"><span class="stat-num">'+done.length+'</span> concluídas</div>';

  // Cards
  function taskCard(t, isDone) {
    const {sub:s, campaign:c} = t;
    const blocked = isBlocked(s,c);
    const late = isLate(s);
    const uc = URG_COLOR[s.urgency] || {color:'#888', bg:'#eee'};
    const scc = STATUS_COLOR[c.status] || {color:'#888', bg:'rgba(136,136,136,.08)'};
    const depTask = s.dep ? (c.subtasks||[]).find(x=>x.id===s.dep) : null;
    const urgOpts = URGENCIAS.map(u =>
      '<option value="'+u+'"'+(u===s.urgency?' selected':'')+'>'+u+'</option>'
    ).join('');
    const metaLine = [
      '<span class="urgency-badge" style="color:'+uc.color+';background:'+uc.bg+'">'+s.urgency+'</span>',
      '<span style="font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;color:'+scc.color+';background:'+scc.bg+'">'+c.status+'</span>',
      s.canal ? '<span class="sub-tag">'+s.canal+'</span>' : '',
      s.due ? '<span style="font-size:11px;color:var(--text-muted)">\u23F0 '+formatDue(s.due)+'</span>' : '',
      late ? '<span class="late-badge">\u26A0 Atrasada</span>' : '',
    ].filter(Boolean).join('');
    const cbSvg = '<svg width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="#fff" stroke-width="2"><path d="M1 4l2 2 4-4"/></svg>';
    const campId = c.id, subId = s.id;
    const div = document.createElement('div');
    div.className = 'task-block' + (isDone ? ' done' : '');
    div.style.cssText = 'padding-left:16px;cursor:pointer';
    div.onclick = function(){
      if (s._openEdit) { openEditCampaignPanel(campId); }
      else { openCampaignDetail(campId); }
    };
    div.innerHTML =
      '<div style="position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:4px 0 0 4px;background:'+uc.color+'"></div>'+
      '<div class="task-cb '+(isDone?'checked':'')+'" id="cb-'+subId+'">'+
        (isDone ? cbSvg : '')+
      '</div>'+
      '<div class="task-body">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px">'+
          '<div class="task-title"'+(isDone?' style="text-decoration:line-through;opacity:.5"':'')+'>'+s.title+'</div>'+
          '<select id="urg-'+subId+'" style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;border:0.5px solid '+uc.color+';background:'+uc.bg+';color:'+uc.color+';cursor:pointer;outline:none;font-family:var(--font);appearance:none">'+
            urgOpts+
          '</select>'+
        '</div>'+
        '<div class="task-campaign" style="margin-bottom:5px">'+c.name+'</div>'+
        '<div class="task-meta-line" style="margin-top:2px;gap:4px">'+metaLine+'</div>'+
        (blocked&&depTask ? '<div class="task-blocked">\uD83D\uDD12 '+depTask.title+'</div>' : '')+
      '</div>';
    // Attach events after setting innerHTML
    const cb = div.querySelector('.task-cb');
    if (cb) cb.onclick = function(e){ e.stopPropagation(); toggleSubtaskPersonal(campId, subId); };
    const sel = div.querySelector('#urg-'+subId);
    if (sel) sel.onchange = function(e){ e.stopPropagation(); changeUrgency(campId, subId, this.value); };
    return div;
  }



  const container = document.getElementById('personal-tasks');
  container.innerHTML = '';
  if (!tasks.length) {
    container.innerHTML = '<div style="font-size:13px;color:var(--text-muted);text-align:center;padding:40px 0">Nenhuma tarefa encontrada</div>';
    return;
  }
  if (pending.length) {
    const title = document.createElement('div');
    title.className = 'task-section-title';
    title.textContent = 'Pendentes (' + pending.length + ')';
    container.appendChild(title);
    pending.forEach(t => container.appendChild(taskCard(t, false)));
  }
  if (done.length) {
    const title = document.createElement('div');
    title.className = 'task-section-title';
    title.style.marginTop = '20px';
    title.textContent = 'Concluídas (' + done.length + ')';
    container.appendChild(title);
    done.forEach(t => container.appendChild(taskCard(t, true)));
  }
}

function toggleSubtaskPersonal(campId, subId) {
  toggleSubtask(campId, subId); renderPersonal();
  if (currentView==='kanban') renderKanban();
}

function changeUrgency(campId, subId, urgency) {
  const c=getCampaign(campId); if (!c) return;
  const s=(c.subtasks||[]).find(x=>x.id===subId); if (!s) return;
  s.urgency=urgency; saveData(); renderPersonal();
}

      '<div class="ov-bar-wrap"><div class="ov-bar-fill" style="width:'+load+'%;background:'+loadColor+'"></div></div>'+
      '<div class="ov-stats">'+
        '<span class="ov-stat"><span>'+pending.length+'</span> pendentes</span>'+
        (late.length?'<span class="ov-stat" style="color:var(--u-urgente)"><span>'+late.length+'</span> atrasadas</span>':'')+
        (urgent.length?'<span class="ov-stat" style="color:var(--u-urgente)"><span>'+urgent.length+'</span> urgentes</span>':'')+

      (upcoming.length?'<div class="ov-tasks">'+upcoming.map(t=>{

      }).join('')+'</div>':'')+
      '</div>';
  }).join('');
}

/* CALENDAR */
function calNav(dir) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth()+dir, 1);
  renderCalendar();
}

function renderCalendar() {
  const year=calDate.getFullYear(), month=calDate.getMonth();
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('cal-title').textContent=months[month]+' '+year;

  const grid=document.getElementById('cal-grid');
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let html=days.map(d=>'<div class="cal-day-header">'+d+'</div>').join('');

  const firstDay=new Date(year,month,1).getDay();
  const lastDate=new Date(year,month+1,0).getDate();
  const today=new Date();

  // Collect tasks by date
  const tasksByDate={};
  campaigns.forEach(c=>{
    (c.subtasks||[]).forEach(s=>{
      if (!s.due) return;
      const d=new Date(s.due);
      if (d.getFullYear()===year&&d.getMonth()===month) {
        const key=d.getDate();
        if (!tasksByDate[key]) tasksByDate[key]=[];
        tasksByDate[key].push({sub:s,campaign:c});
      }
    });
  });

  for (let i=0;i<firstDay;i++) html+='<div class="cal-cell other-month"></div>';
  for (let d=1;d<=lastDate;d++) {
    const isToday=today.getDate()===d&&today.getMonth()===month&&today.getFullYear()===year;
    const isSelected=calSelectedDay===d;
    const tasks=tasksByDate[d]||[];
    const dots=tasks.slice(0,5).map(t=>{const uc=URG_COLOR[t.sub.urgency]||{color:'#888'};return '<span class="cal-dot" style="background:'+uc.color+'"></span>';}).join('');
    html+='<div class="cal-cell'+(isToday?' today':'')+(isSelected?' selected':'')+'" onclick="calSelectDay('+d+','+year+','+month+')">'+
      '<div class="cal-day-num">'+d+'</div>'+dots+'</div>';
  }
  grid.innerHTML=html;

  if (calSelectedDay) calSelectDay(calSelectedDay,year,month);
}

function calSelectDay(d,y,m) {
  calSelectedDay=d;
  const date=new Date(y,m,d);
  const label=date.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  document.getElementById('cal-side-title').textContent=label;
  const tasks=[];
  campaigns.forEach(c=>{
    (c.subtasks||[]).forEach(s=>{
      if (!s.due) return;
      const sd=new Date(s.due);
      if (sd.getDate()===d&&sd.getMonth()===m&&sd.getFullYear()===y) tasks.push({sub:s,campaign:c});
    });
  });
  const el=document.getElementById('cal-side-tasks');
  if (!tasks.length){el.innerHTML='<div style="color:var(--text-muted);font-size:13px">Nenhuma tarefa</div>';return;}
  el.innerHTML=tasks.map(t=>{
    const uc=URG_COLOR[t.sub.urgency]||{color:'#888'};
    const m2=getMember(t.sub.owner);
    return '<div class="cal-task-item" onclick="openCampaignDetail(\''+t.campaign.id+'\')">'+
      '<div class="cal-task-name" style="border-left:3px solid '+uc.color+';padding-left:7px">'+t.sub.title+'</div>'+
      '<div class="cal-task-meta">'+t.campaign.name+(m2?' · '+m2.name:'')+'</div></div>';
  }).join('');
  renderCalendar();
}

/* DRAG & DROP KANBAN */
let draggedId = null;

function dragStart(e, el) {
  // el is the card element itself
  const id = el.id.replace('card-','');
  draggedId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(() => { el.classList.add('dragging'); }, 0);
}

function dragEnd(e) {
  const el = document.getElementById('card-'+draggedId);
  if (el) el.classList.remove('dragging');
  // Remove all drag-over highlights
  document.querySelectorAll('.kanban-cards.drag-over').forEach(c => c.classList.remove('drag-over'));
  draggedId = null;
}

function dragOver(e, status) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Highlight target column
  document.querySelectorAll('.kanban-cards.drag-over').forEach(c => c.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  // Only remove if leaving the container (not entering a child)
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function dropCard(e, status) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedId) return;
  const c = getCampaign(draggedId);
  if (!c || c.status === status) return;
  const oldStatus = c.status;
  c.status = status;
  applyStatusRules(c, oldStatus, status);
  saveData();
  renderKanban();
  if (currentView==='personal') renderPersonal();
  showToast(c.name + ' → ' + status, '#7c6af7');
}

/* MULTI-SELECT & BULK DELETE */
let selectedCards = new Set();
let isSelecting = false;
let selectStartId = null;

function cardClick(e, id) {
  // If in selection mode, any click toggles
  if (selectedCards.size > 0) {
    toggleCardSelection(id);
    return;
  }
  // Cmd/Ctrl/Shift for multi-select
  if (e.metaKey || e.ctrlKey || e.shiftKey) {
    toggleCardSelection(id);
    return;
  }
  // Normal click — open detail
  openCampaignDetail(id);
}

function toggleCardSelection(id) {
  if (selectedCards.has(id)) {
    selectedCards.delete(id);
  } else {
    selectedCards.add(id);
  }
  updateCardSelectionUI();
}

function updateCardSelectionUI() {
  document.querySelectorAll('.campaign-card').forEach(el => {
    const cid = el.id?.replace('card-','');
    const isSel = selectedCards.has(cid);
    el.classList.toggle('selected', isSel);
    const cb = el.querySelector('.card-checkbox');
    if (cb) {
      cb.classList.toggle('checked', isSel);
      cb.classList.toggle('visible', isSel);
      cb.innerHTML = isSel ? '<svg width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="#fff" stroke-width="2"><path d="M1 4l2 2 4-4"/></svg>' : '';
    }
  });
  const bar = document.getElementById('bulk-delete-bar');
  const cnt = document.getElementById('bulk-count');
  if (!bar) return;
  if (selectedCards.size > 0) {
    bar.classList.add('show');
    cnt.textContent = selectedCards.size + ' selecionada' + (selectedCards.size>1?'s':'');
  } else {
    bar.classList.remove('show');
  }
}

function clearSelection() {
  selectedCards.clear();
  updateCardSelectionUI();
}

function bulkDelete() {
  if (!selectedCards.size) return;
  const n = selectedCards.size;
  const noun = n > 1 ? 's' : '';
  campaigns = campaigns.filter(c => !selectedCards.has(c.id));
  selectedCards.clear();
  saveData();
  renderKanban(); // cards re-rendered, selection cleared visually
  // Force hide bar
  const bar = document.getElementById('bulk-delete-bar');
  if (bar) bar.classList.remove('show');
  showToast(n + ' campanha' + noun + ' excluída' + noun, '#ef4444');
}

// Keyboard: Delete key to bulk delete, Escape to clear
document.addEventListener('keydown', e => {
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedCards.size > 0 && !e.target.matches('input,textarea,select')) {
    e.preventDefault();
    bulkDelete();
  }
  if (e.key === 'Escape' && selectedCards.size > 0) {
    clearSelection();
  }
});

// Click outside cards to clear selection
document.addEventListener('click', e => {
  if (selectedCards.size > 0 && !e.target.closest('.campaign-card') && !e.target.closest('#bulk-delete-bar')) {
    clearSelection();
  }
});

/* INIT */
(async function() {
  // Wait for Supabase SDK to be ready (it loads via script tag)
  let sdkWait = 0;
  while (!window.supabase && sdkWait < 20) {
    await new Promise(r => setTimeout(r, 100));
    sdkWait++;
  }

  initDB();
  await loadMembers();

  // Debug: log member count to console
  console.log('[Nordmann] Membros carregados:', MEMBERS.length, _db ? '(Supabase ativo)' : '(só localStorage)');

  const savedSession = localStorage.getItem(SESSION_KEY);
  if (savedSession) {
    const m = getMember(savedSession);
    if (m) {
      window.currentUser = m;
      document.getElementById('picker-screen').classList.add('hidden');
      bootApp();
      return;
    }
  }
  renderMemberPicker();
})();
</script>
