<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nordmann — Gestão de Campanhas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* --- RESET --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* --- VARS --- */
:root{
  --font:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --sidebar-w:48px;
  --bg-base:#f0f0f0;
  --bg-surface:#e6e6e8;
  --bg-card:#ffffff;
  --bg-card-hover:#f8f8fa;
  --bg-modal:#ffffff;
  --border:#e0e0e2;
  --border-light:#ebebed;
  --text-primary:#18181b;
  --text-secondary:#52525b;
  --text-muted:#a1a1aa;
  --sidebar-bg:#18181b;
  --sidebar-active:rgba(255,255,255,0.08);
  --radius:8px;
  --transition:0.15s ease;
  /* status */
  --s-plan:#6366f1; --s-plan-bg:rgba(99,102,241,.08);
  --s-wip:#f59e0b;  --s-wip-bg:rgba(245,158,11,.08);
  --s-block:#ef4444;--s-block-bg:rgba(239,68,68,.08);
  --s-wait:#8b5cf6; --s-wait-bg:rgba(139,92,246,.08);
  --s-done:#10b981; --s-done-bg:rgba(16,185,129,.08);
  /* urgency */
  --u-urgente:#ef4444;    --u-urgente-bg:rgba(239,68,68,.08);
  --u-importante:#f59e0b; --u-importante-bg:rgba(245,158,11,.08);
  --u-normal:#10b981;     --u-normal-bg:rgba(16,185,129,.08);
  /* types */
  --c-campanha:#7c6af7;   --c-campanha-bg:rgba(124,106,247,.08);
  --c-conteudo:#10b981;   --c-conteudo-bg:rgba(16,185,129,.08);
  --c-tarefa:#f59e0b;     --c-tarefa-bg:rgba(245,158,11,.08);
}

/* --- MEMBER PICKER SCREEN --- */
#picker-screen{
  position:fixed;inset:0;
  background:var(--bg-base);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;font-family:var(--font);
}
#picker-screen.hidden{display:none}
.picker-box{width:100%;max-width:520px;padding:0 20px}
.picker-logo{width:44px;height:44px;background:var(--c-campanha);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;margin:0 auto 14px}
.picker-title{font-size:22px;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:4px}
.picker-sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:28px}
.member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.member-card{
  background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;
  padding:16px 10px;text-align:center;cursor:pointer;
  transition:all .15s ease;
}
.member-card:hover{border-color:var(--c-campanha);background:var(--c-campanha-bg);transform:translateY(-2px)}
.member-avatar{
  width:48px;height:48px;border-radius:50%;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:600;color:#fff;overflow:hidden;
}
.member-avatar img{width:100%;height:100%;object-fit:cover}
.member-name{font-size:12px;font-weight:500;color:var(--text-primary);margin-bottom:2px}
.member-role{font-size:10px;color:var(--text-muted)}
.btn-add-member{
  width:100%;height:42px;background:transparent;
  border:1.5px dashed var(--border);border-radius:10px;
  font-size:13px;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;
}
.btn-add-member:hover{border-color:var(--c-campanha);color:var(--c-campanha)}

/* --- TEMPLATES --- */
.tpl-picker{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.tpl-card{
  border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;cursor:pointer;
  transition:all .15s;background:var(--bg-card);text-align:left;
  display:flex;align-items:center;gap:8px;
}
.tpl-card:hover{border-color:var(--c-campanha)}
.tpl-card.active{border-color:var(--c-campanha);box-shadow:0 0 0 2px rgba(124,106,247,.12)}
.tpl-card-icon{font-size:15px;flex-shrink:0}
.tpl-card-name{font-size:12px;font-weight:500;color:var(--text-primary)}
.tpl-card-desc{display:none}
.tpl-section{background:transparent;border:none;border-bottom:0.5px solid var(--border);padding:16px 0;margin-bottom:0}
.tpl-section:last-child{border-bottom:none}
.tpl-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tpl-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.tpl-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.tpl-row-5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.tpl-checklist-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.tpl-checklist-item:last-child{border-bottom:none}
.tpl-cl-cb{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.tpl-cl-cb.checked{background:var(--c-campanha);border-color:var(--c-campanha)}
.tpl-cl-text{flex:1;font-size:12px;color:var(--text-primary)}
.tpl-cl-text.done{text-decoration:line-through;color:var(--text-muted)}
.tpl-add-row{display:flex;gap:6px;margin-top:8px}
.tpl-add-row input{flex:1;height:30px;font-size:12px}
.tpl-add-row button{height:30px;padding:0 10px;font-size:12px;background:var(--c-campanha);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;flex-shrink:0}
.tpl-dyn-item{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.tpl-dyn-item input,.tpl-dyn-item select{font-size:12px;height:30px}
.tpl-remove-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0 4px;line-height:1;flex-shrink:0}
.tpl-remove-btn:hover{color:var(--u-urgente)}
.tpl-slide-box{background:var(--bg-card);border:0.5px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;position:relative}
.tpl-slide-num{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--c-campanha);margin-bottom:8px}
.tpl-member-toggle{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer}
.tpl-member-toggle input[type=checkbox]{width:14px;height:14px;accent-color:var(--c-campanha);cursor:pointer}
.tpl-member-block{background:var(--bg-card);border:0.5px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.tpl-member-block-title{font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tpl-step-box{background:var(--bg-surface);border:0.5px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;position:relative}
.tpl-step-num{font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:6px}

/* --- TEMPLATE DETAIL VIEW --- */
.td-section{background:var(--bg-surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.td-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.td-field{margin-bottom:10px}
.td-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);display:block;margin-bottom:3px}
.td-value{font-size:13px;color:var(--text-primary);line-height:1.5;white-space:pre-wrap}
.td-value.muted{color:var(--text-muted);font-style:italic;font-size:12px}
.td-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.td-metas{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.td-meta-box{background:var(--bg-card);border-radius:8px;padding:8px;text-align:center}
.td-meta-val{font-size:16px;font-weight:700;color:var(--c-campanha)}
.td-meta-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:2px}
.td-cl-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.td-cl-item:last-child{border-bottom:none}
.td-cl-cb{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.td-cl-cb.checked{background:var(--c-campanha);border-color:var(--c-campanha)}
.td-cl-text{flex:1;font-size:12px;color:var(--text-primary)}
.td-cl-text.done{text-decoration:line-through;color:var(--text-muted)}
.td-slide-box{background:var(--bg-card);border:0.5px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.td-slide-num{font-size:10px;font-weight:600;color:var(--c-campanha);margin-bottom:6px}
.td-step-box{background:var(--bg-card);border:0.5px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.td-step-cb{width:15px;height:15px;border:1.5px solid var(--border);border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.td-step-cb.checked{background:var(--c-campanha);border-color:var(--c-campanha)}
.td-step-title{font-size:12px;color:var(--text-primary);font-weight:500}
.td-step-title.done{text-decoration:line-through;color:var(--text-muted)}
.td-step-meta{font-size:10px;color:var(--text-muted);margin-top:2px}
.td-produto-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.td-data-item{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.td-data-item:last-child{border-bottom:none}
.td-data-label{font-size:12px;color:var(--text-secondary);flex:1}
.td-data-date{font-size:11px;color:var(--c-campanha);font-weight:500}
.td-banner-preview{max-width:100%;max-height:160px;border-radius:8px;margin-top:4px;display:block}
.tpl-photo-upload{width:100%;height:100px;border:1.5px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text-muted);gap:6px;transition:border-color .15s;background:var(--bg-card)}
.tpl-photo-upload:hover{border-color:var(--c-campanha);color:var(--c-campanha)}

/* --- MODAL GENÉRICO --- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:10000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-backdrop.active{opacity:1;pointer-events:all}
.modal-box{
  background:var(--bg-modal);border-radius:16px;padding:28px;
  width:360px;max-width:calc(100vw - 32px);
}
.modal-h{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:20px}
.modal-field{margin-bottom:14px}
.modal-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);display:block;margin-bottom:5px}
.modal-input{
  width:100%;height:38px;border:0.5px solid var(--border);border-radius:8px;
  padding:0 12px;font-size:13px;outline:none;color:var(--text-primary);
  background:var(--bg-card);transition:border-color .15s;
}
.modal-input:focus{border-color:var(--c-campanha)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-primary{height:36px;padding:0 18px;background:var(--c-campanha);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500}
.btn-ghost{height:36px;padding:0 14px;background:var(--bg-surface);color:var(--text-secondary);border:none;border-radius:var(--radius);font-size:13px}
.modal-msg{font-size:12px;margin-top:8px;min-height:16px}
.modal-msg.err{color:var(--u-urgente)}
.modal-msg.ok{color:var(--c-conteudo)}

/* --- AVATAR UPLOAD --- */
.avatar-upload-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.avatar-upload-circle{
  width:52px;height:52px;border-radius:50%;background:var(--bg-surface);
  border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:20px;overflow:hidden;position:relative;cursor:pointer;flex-shrink:0;
}
.avatar-upload-circle img{width:100%;height:100%;object-fit:cover}
.avatar-remove-btn{
  position:absolute;top:-3px;right:-3px;width:18px;height:18px;
  border-radius:50%;background:#ef4444;color:#fff;border:none;
  font-size:12px;line-height:1;display:none;z-index:1;
}
.btn-choose-photo{
  font-size:12px;color:var(--c-campanha);border:0.5px solid var(--c-campanha);
  border-radius:6px;padding:6px 14px;background:var(--c-campanha-bg);cursor:pointer;
}

/* --- LAYOUT PRINCIPAL --- */
body{font-family:var(--font);background:var(--bg-base);color:var(--text-primary);height:100vh;overflow:hidden;display:flex}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--sidebar-bg);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0;gap:4px;height:100vh;position:fixed;left:0;top:0;z-index:100;
}
.sidebar-logo{
  width:28px;height:28px;background:var(--c-campanha);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;
}
.sidebar-sep{width:24px;height:0.5px;background:rgba(255,255,255,.1);margin:4px 0}
.tooltip-wrap{position:relative;display:flex;align-items:center}
.tooltip{
  position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);
  background:var(--sidebar-bg);color:#fff;font-size:11px;padding:4px 8px;
  border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;
  transition:opacity .15s;z-index:200;
}
.tooltip-wrap:hover .tooltip{opacity:1}
.sidebar-btn{
  width:32px;height:32px;border:none;border-radius:8px;background:transparent;
  color:rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.sidebar-btn svg{width:16px;height:16px}
.sidebar-btn:hover,.sidebar-btn.active{background:var(--sidebar-active);color:#fff}
.avatar-btn{
  width:26px;height:26px;border-radius:50%;border:none;
  font-size:10px;font-weight:600;color:#fff;overflow:hidden;
}
.avatar-btn:hover{opacity:.8}
#sidebar-members{display:flex;flex-direction:column;align-items:center;gap:4px}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{
  height:44px;background:var(--bg-card);border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;
}
.topbar-title{font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap}
.topbar-sep{width:0.5px;height:16px;background:var(--border)}
.topbar-spacer{flex:1}
.chips{display:flex;gap:5px;overflow-x:auto;flex:1}
.chip{
  height:26px;padding:0 10px;border-radius:20px;font-size:11px;border:0.5px solid var(--border);
  background:var(--bg-card);color:var(--text-secondary);white-space:nowrap;
  transition:all var(--transition);
}
.chip:hover{background:var(--bg-surface)}
.chip.active{background:var(--c-campanha-bg);border-color:var(--c-campanha);color:var(--c-campanha)}
.btn-new{
  height:30px;padding:0 12px;background:var(--c-campanha);color:#fff;border:none;
  border-radius:var(--radius);font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;
}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:32px}
.view{display:none}
.view.active{display:block}

/* --- KANBAN --- */
.kanban-board{display:flex;gap:12px;min-height:calc(100vh - 120px);align-items:flex-start}
.kanban-col{min-width:260px;max-width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:0}
.kanban-col-header{display:flex;align-items:center;gap:7px;padding:8px 2px;margin-bottom:6px}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-title{font-size:12px;font-weight:500;flex:1}
.col-count{font-size:11px;color:var(--text-muted);background:var(--bg-surface);padding:1px 7px;border-radius:10px}
.kanban-cards{display:flex;flex-direction:column;gap:8px}
.campaign-card{
  background:var(--bg-card);border:0.5px solid var(--border);border-radius:10px;
  padding:12px 14px;cursor:pointer;transition:all var(--transition);
}
.campaign-card:hover{border-color:var(--c-campanha);box-shadow:0 2px 8px rgba(124,106,247,.1)}
.campaign-card.selected{border-color:var(--c-campanha);background:rgba(124,106,247,.04);box-shadow:0 0 0 2px rgba(124,106,247,.15)}
.card-checkbox{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);background:var(--bg-card);position:absolute;top:10px;right:10px;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.card-checkbox.visible{display:flex}
.card-checkbox.checked{background:var(--c-campanha);border-color:var(--c-campanha)}
.campaign-card:hover .card-checkbox{display:flex}
.campaign-card.selected .card-checkbox{display:flex}
.campaign-card{position:relative;user-select:none}
.campaign-card.dragging{opacity:.35;transform:rotate(1.5deg);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.kanban-cards.drag-over{background:var(--c-campanha-bg);border-radius:8px;outline:2px dashed var(--c-campanha);outline-offset:4px;min-height:60px}
#bulk-delete-bar{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:var(--sidebar-bg);color:#fff;border-radius:20px;padding:8px 18px;display:flex;align-items:center;gap:12px;font-size:12px;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
#bulk-delete-bar.show{opacity:1;pointer-events:all}
#bulk-delete-bar button{height:26px;padding:0 12px;border-radius:10px;border:none;font-size:11px;cursor:pointer;font-family:var(--font)}
.btn-bulk-del{background:#ef4444;color:#fff}
.btn-bulk-cancel{background:rgba(255,255,255,.1);color:#fff}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:13px;font-weight:500;color:var(--text-primary);line-height:1.3;flex:1}
.type-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;flex-shrink:0}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-member{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}
.card-date{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}
.mini-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;flex-shrink:0;width:20px;height:20px;overflow:hidden}
.mini-avatar img{width:100%;height:100%;object-fit:cover}
.progress-bar{height:3px;background:var(--bg-surface);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:3px}
.empty-col{font-size:12px;color:var(--text-muted);text-align:center;padding:20px 0;border:1.5px dashed var(--border);border-radius:8px}
.comment-count{font-size:10px;color:var(--text-muted)}

/* --- SLIDE PANEL --- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.active{opacity:1;pointer-events:all}
.slide-panel{
  position:fixed;top:0;right:0;width:760px;max-width:96vw;height:100%;
  background:var(--bg-modal);border-left:0.5px solid var(--border);
  z-index:201;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.slide-panel.active{transform:translateX(0)}
.panel-top{padding:16px 20px 0;border-bottom:0.5px solid var(--border)}
.panel-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.panel-title{font-size:15px;font-weight:600;color:var(--text-primary)}
.close-btn{width:28px;height:28px;border:none;background:var(--bg-surface);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.panel-body{flex:1;overflow-y:auto;padding:16px 20px}
.panel-footer{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.btn-save{height:34px;padding:0 18px;background:var(--c-campanha);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500}
.btn-cancel{height:34px;padding:0 14px;background:var(--bg-surface);color:var(--text-secondary);border:none;border-radius:var(--radius);font-size:13px}
.btn-delete{height:34px;padding:0 14px;background:transparent;border:0.5px solid var(--u-urgente);border-radius:var(--radius);color:var(--u-urgente);font-size:13px}

/* --- FORM --- */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);display:block;margin-bottom:5px}
.form-input{width:100%;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;outline:none;color:var(--text-primary);background:var(--bg-card);transition:border-color .15s}
.form-input:focus{border-color:var(--c-campanha)}
.form-textarea{width:100%;border:0.5px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;outline:none;color:var(--text-primary);background:var(--bg-card);resize:none;overflow:hidden;min-height:60px;transition:border-color .15s;line-height:1.5}
.form-textarea:focus{border-color:var(--c-campanha)}
.form-select{width:100%;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;outline:none;color:var(--text-primary);background:var(--bg-card);appearance:none}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:11px;color:var(--text-muted)}
.multi-select{display:flex;flex-wrap:wrap;gap:6px}
.multi-item{padding:4px 10px;border-radius:20px;font-size:11px;border:0.5px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.multi-item.selected{border-color:var(--c-campanha);background:var(--c-campanha-bg);color:var(--c-campanha)}
.m-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.form-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin:18px 0 10px;display:flex;justify-content:space-between;align-items:center}
.btn-add-sub{height:28px;padding:0 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg-surface);color:var(--text-secondary);font-size:11px}
.btn-add-sub:hover{border-color:var(--c-campanha);color:var(--c-campanha)}
.subtask-form{background:var(--bg-surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;position:relative}
.subtask-remove{position:absolute;top:8px;right:8px;background:none;border:none;font-size:16px;color:var(--text-muted);line-height:1}

/* --- CAMPAIGN DETAIL --- */
.status-select{
  width:100%;padding:6px 10px;border:0.5px solid var(--border);border-radius:var(--radius);
  font-size:12px;outline:none;background:var(--bg-surface);font-family:var(--font);
  appearance:none;cursor:pointer;margin-bottom:14px;
}
.subtask-row{
  display:flex;align-items:flex-start;gap:10px;padding:9px 0;
  border-bottom:0.5px solid var(--border-light);
}
.subtask-row:last-child{border-bottom:none}
.sub-cb{
  width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);
  flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;background:var(--bg-card);
}
.sub-cb.checked{background:var(--c-campanha);border-color:var(--c-campanha)}
.sub-body{flex:1;min-width:0}
.sub-title{font-size:13px;color:var(--text-primary);line-height:1.3;margin-bottom:3px}
.sub-title.done{text-decoration:line-through;opacity:.5}
.sub-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sub-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg-surface);border:0.5px solid var(--border);color:var(--text-muted)}
.urg-badge{font-size:10px;padding:1px 7px;border-radius:4px;font-weight:500}
.late-badge{font-size:10px;color:var(--u-urgente);font-weight:500}
.blocked-label{font-size:10px;color:var(--u-urgente);margin-top:3px}
.add-sub-row{display:flex;gap:6px;margin-top:10px}
.add-sub-input{flex:1;height:32px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:12px;outline:none;background:var(--bg-card)}
.add-sub-input:focus{border-color:var(--c-campanha)}

/* --- PAINEL PESSOAL --- */
.personal-panel{max-width:680px;margin:0 auto}
.admin-tab{height:34px;padding:0 16px;background:transparent;border:none;border-bottom:2px solid transparent;font-size:13px;color:var(--text-secondary);cursor:pointer;font-family:var(--font);transition:all var(--transition)}
.admin-tab.active{color:var(--c-campanha);border-bottom-color:var(--c-campanha)}
.admin-tab:hover{color:var(--text-primary)}
.tpl-edit-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;transition:border-color var(--transition)}
.tpl-edit-card:hover{border-color:var(--c-campanha)}
.panel-header{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:0.5px solid var(--border);margin-bottom:14px}
.panel-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff;flex-shrink:0;overflow:hidden}
.panel-avatar img{width:100%;height:100%;object-fit:cover}
.panel-name{font-size:15px;font-weight:600;color:var(--text-primary)}
.panel-role{font-size:12px;color:var(--text-muted)}
.panel-search{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;height:34px;margin-bottom:12px}
.panel-search svg{width:14px;height:14px;color:var(--text-muted);flex-shrink:0}
.panel-search input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--text-primary)}
.panel-stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.stat-chip{padding:5px 12px;border-radius:20px;font-size:11px;background:var(--bg-card);border:0.5px solid var(--border);color:var(--text-secondary);display:flex;align-items:center;gap:5px}
.stat-num{font-weight:600;color:var(--text-primary)}
.task-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.task-block{
  background:var(--bg-card);border:0.5px solid var(--border);border-radius:10px;
  padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;
  cursor:pointer;transition:all .15s;position:relative;
}
.task-block:hover{border-color:var(--c-campanha)}
.task-block.done{opacity:.6}
.task-cb{
  width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  cursor:pointer;margin-top:1px;transition:all .15s;
}
.task-cb.checked{background:var(--c-campanha);border-color:var(--c-campanha)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:3px}
.task-campaign{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.task-meta-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.task-blocked{font-size:11px;color:var(--u-urgente);margin-top:3px}
.urgency-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}

/* --- FILTROS DROPDOWN --- */
.filter-bar{padding:10px 0 14px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:0.5px solid var(--border);margin-bottom:14px}
.filter-dd{position:relative}
.filter-dd-btn{
  height:30px;padding:0 12px;border:0.5px solid var(--border);border-radius:6px;
  background:var(--bg-card);font-size:12px;color:var(--text-secondary);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.filter-dd-btn.has-value{border-color:var(--c-campanha);background:var(--c-campanha-bg);color:var(--c-campanha)}
.filter-dd-list{
  display:none;position:absolute;top:34px;left:0;
  background:var(--bg-card);border:0.5px solid var(--border);border-radius:8px;
  z-index:300;min-width:150px;max-height:220px;overflow-y:auto;
  box-shadow:0 4px 16px rgba(0,0,0,.1);padding:4px 0;
}
.filter-dd-list.open{display:block}
.filter-dd-item{padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text-secondary);transition:background .1s}
.filter-dd-item:hover,.filter-dd-item.sel{background:var(--c-campanha-bg);color:var(--c-campanha)}
.filter-dd-clear{padding:6px 14px;font-size:11px;color:var(--text-muted);cursor:pointer;border-top:0.5px solid var(--border)}
.btn-clear-all{height:30px;padding:0 12px;border:0.5px solid var(--u-urgente);border-radius:6px;background:var(--u-urgente-bg);color:var(--u-urgente);font-size:11px}

/* --- CARGA DA EQUIPE --- */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.overview-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s}
.overview-card:hover{border-color:var(--c-campanha)}
.ov-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ov-name{font-size:14px;font-weight:600}
.ov-role{font-size:11px;color:var(--text-muted)}
.ov-bar-wrap{height:4px;background:var(--bg-surface);border-radius:2px;margin-bottom:10px;overflow:hidden}
.ov-bar-fill{height:100%;border-radius:2px}
.ov-stats{display:flex;gap:8px;flex-wrap:wrap}
.ov-stat{font-size:11px;color:var(--text-muted)}
.ov-stat span{font-weight:600;color:var(--text-primary)}
.ov-tasks{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.ov-task-item{font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
.ov-task-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* --- CALENDÁRIO --- */
.calendar-wrap{display:flex;gap:0;height:calc(100vh - 90px)}
.calendar-main{flex:1;min-width:0}
.calendar-side{width:280px;flex-shrink:0;border-left:0.5px solid var(--border);padding:16px;overflow-y:auto}
.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.cal-month-title{font-size:15px;font-weight:600;flex:1;text-align:center}
.cal-nav-btn{width:28px;height:28px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg-card);display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-cell{background:var(--bg-card);min-height:72px;padding:6px;cursor:pointer;transition:background .15s}
.cal-cell:hover{background:var(--bg-surface)}
.cal-cell.selected{background:var(--c-campanha-bg)}
.cal-cell.today .cal-day-num{background:var(--c-campanha);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-cell.other-month{opacity:.4}
.cal-day-header{text-align:center;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);padding:6px 0;background:var(--bg-base)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text-primary);margin-bottom:4px}
.cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:1px}
.cal-side-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:12px}
.cal-task-item{padding:8px 10px;background:var(--bg-surface);border-radius:8px;margin-bottom:6px;font-size:12px;cursor:pointer;transition:all .15s}
.cal-task-item:hover{background:var(--c-campanha-bg)}
.cal-task-name{font-weight:500;color:var(--text-primary);margin-bottom:2px}
.cal-task-meta{color:var(--text-muted);font-size:10px}

/* --- COMENTÁRIOS NO DETALHE --- */
.comment-section{margin-top:20px;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.comment-header{padding:10px 14px;background:var(--bg-surface);border-bottom:0.5px solid var(--border);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)}
.comment-list{padding:12px 14px;max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.comment-item{display:flex;gap:10px;align-items:flex-start}
.comment-avatar{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;overflow:hidden}
.comment-avatar img{width:100%;height:100%;object-fit:cover}
.comment-meta{font-size:11px;font-weight:500;margin-bottom:2px}
.comment-meta span{font-weight:400;color:var(--text-muted)}
.comment-text{font-size:12px;color:var(--text-secondary);line-height:1.5}
.comment-input-row{padding:10px 14px;border-top:0.5px solid var(--border);display:flex;gap:8px}
.comment-input-row input{flex:1;height:32px;border:0.5px solid var(--border);border-radius:6px;padding:0 10px;font-size:12px;outline:none;background:var(--bg-card)}
.comment-input-row input:focus{border-color:var(--c-campanha)}

/* --- PERFIL MODAL --- */
#profile-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
#profile-modal-backdrop.active{opacity:1;pointer-events:all}

/* --- ADMIN --- */
.admin-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.admin-badge-active{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--c-conteudo-bg,rgba(16,185,129,.08));color:var(--c-conteudo);font-weight:500}
.btn-revoke{height:28px;padding:0 12px;background:transparent;color:var(--u-urgente);border:0.5px solid var(--u-urgente);border-radius:6px;font-size:11px}

/* --- TOAST --- */
.toast{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg-card);border:0.5px solid var(--border);border-radius:20px;
  padding:8px 16px;display:flex;align-items:center;gap:8px;z-index:9999;
  font-size:12px;color:var(--text-primary);opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.1);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* --- STORAGE BAR --- */
.storage-bar{
  position:fixed;bottom:0;left:var(--sidebar-w);right:0;height:28px;
  background:var(--bg-surface);border-top:0.5px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:50;
  font-size:11px;color:var(--text-muted);
}
.storage-bar button{color:var(--text-muted);cursor:pointer;background:none;border:none;font-family:var(--font);font-size:11px;padding:0}
.storage-bar button:hover{color:var(--text-secondary)}
.storage-sep{color:var(--border-light)}
.content{padding-bottom:36px}

/* --- TEMPLATE CARDS --- */
#template-section{margin-bottom:16px}
.template-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.template-card{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg-card);cursor:pointer;text-align:left;transition:all .15s}
.template-card:hover,.template-card.selected{border-color:var(--c-campanha);background:var(--c-campanha-bg)}
.template-icon{font-size:16px;margin-bottom:4px}
.template-name{font-size:12px;font-weight:500;color:var(--text-primary)}
.template-desc{font-size:10px;color:var(--text-muted);margin-top:2px}
.section-block{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.section-block-header{padding:7px 12px;background:var(--bg-surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:6px}
.section-block-body{padding:12px}

@media(max-width:900px){.overview-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- ===========================================
     MEMBER PICKER
=========================================== -->
<div id="picker-screen">
  <div class="picker-box">
    <div class="picker-logo">N</div>
    <div class="picker-title">Nordmann</div>
    <div class="picker-sub">Quem está acessando?</div>
    <div class="member-grid" id="member-pick-grid"></div>
    <button class="btn-add-member" onclick="openAddMemberModal()">
      <span style="font-size:18px;line-height:1">+</span> Adicionar membro
    </button>
  </div>
</div>

<!-- ===========================================
     ADD / EDIT MEMBER MODAL
=========================================== -->
<div class="modal-backdrop" id="member-modal-backdrop" onclick="closeMemberModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-h" id="member-modal-title">Novo membro</div>
    <input type="hidden" id="mm-id">

    <div class="avatar-upload-row">
      <div style="position:relative;flex-shrink:0">
        <div class="avatar-upload-circle" id="mm-avatar-preview" onclick="document.getElementById('mm-file').click()">📷</div>
        <button class="avatar-remove-btn" id="mm-remove-btn" onclick="mmRemovePhoto()">×</button>
      </div>
      <label class="btn-choose-photo">
        Escolher foto
        <input type="file" accept="image/*" id="mm-file" style="display:none" onchange="mmPreviewPhoto(this)">
      </label>
    </div>

    <div class="modal-field">
      <label class="modal-label">Nome *</label>
      <input class="modal-input" id="mm-name" placeholder="Ex: Eric Martins">
    </div>
    <div class="modal-field">
      <label class="modal-label">Cargo</label>
      <input class="modal-input" id="mm-role" placeholder="Ex: Diretor de MKT">
    </div>

    <div class="modal-msg" id="mm-msg"></div>
    <div class="modal-actions">
      <button id="mm-delete-btn" class="btn-ghost" style="display:none;color:var(--u-urgente);border:0.5px solid var(--u-urgente);background:transparent" onclick="deleteMember()">Remover</button>
      <div style="flex:1"></div>
      <button class="btn-ghost" onclick="closeMemberModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveMember()">Salvar</button>
    </div>
  </div>
</div>

<!-- ===========================================
     PROFILE EDIT MODAL (dentro do app)
=========================================== -->
<div id="profile-modal-backdrop" onclick="closeProfileModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-h">✏️ Editar perfil</div>

    <div class="avatar-upload-row">
      <div style="position:relative;flex-shrink:0">
        <div class="avatar-upload-circle" id="pm-avatar-preview" onclick="document.getElementById('pm-file').click()">📷</div>
        <button class="avatar-remove-btn" id="pm-remove-btn" onclick="pmRemovePhoto()">×</button>
      </div>
      <label class="btn-choose-photo">
        Escolher foto
        <input type="file" accept="image/*" id="pm-file" style="display:none" onchange="pmPreviewPhoto(this)">
      </label>
    </div>

    <div class="modal-field">
      <label class="modal-label">Nome</label>
      <input class="modal-input" id="pm-name" placeholder="Seu nome">
    </div>
    <div class="modal-field">
      <label class="modal-label">Cargo</label>
      <input class="modal-input" id="pm-role" placeholder="Seu cargo">
    </div>

    <div class="modal-msg" id="pm-msg"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeProfileModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveProfile()">Salvar</button>
    </div>
    <div style="border-top:0.5px solid var(--border);margin-top:16px;padding-top:12px;text-align:center">
      <button onclick="doLogout()" style="font-size:12px;color:var(--u-urgente);background:none;border:none;cursor:pointer;font-family:var(--font)">Sair e trocar de usuário</button>
    </div>
  </div>
</div>

<!-- ===========================================
     APP PRINCIPAL
=========================================== -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">N</div>

  <div class="tooltip-wrap">
    <button class="sidebar-btn active" id="nav-kanban" onclick="setView('kanban')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="4" height="14" rx="1"/><rect x="6" y="1" width="4" height="10" rx="1"/><rect x="11" y="1" width="4" height="12" rx="1"/></svg>
    </button>
    <span class="tooltip">Kanban</span>

async function loadMembers() {

  } catch(e) {}
  if (_db) {
    try {
      const res = await _db.from('nordmann_data').select('payload').eq('key','members').single();

        console.warn('[Nordmann] loadMembers Supabase error:', res.error.message);

/* -- COMPRESS IMAGE -- */
function compressImage(file, cb) {
  if (!file) return;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = function() {
    const size = 200;
    canvas.width = size; canvas.height = size;
    const min = Math.min(img.width, img.height);
    ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
    URL.revokeObjectURL(url);
    cb(canvas.toDataURL('image/jpeg', 0.8));
  };
  img.src = url;
}

// Templates are stored as customizable user data
function getCustomTemplates() {
  try {
    const s = localStorage.getItem('nordmann_templates_v1');
    return s ? JSON.parse(s) : [];
  } catch(e) { return []; }
}

function saveCustomTemplates(tpls) {
  localStorage.setItem('nordmann_templates_v1', JSON.stringify(tpls));
  if (_db) {
    try {
      _db.from('nordmann_data').upsert(
        {key:'templates', payload:JSON.stringify(tpls), updated_at:new Date().toISOString()},
        {onConflict:'key'}
      );
    } catch(e) {}
  }
}

function updateCustomTpl(idx, field, val) {
  const custom = getCustomTemplates();
  if (!custom[idx]) return;
  if (field === 'checklist') custom[idx].checklist = val.split('\n').filter(Boolean);
  else custom[idx][field] = val;
  saveCustomTemplates(custom);
}

function deleteCustomTpl(idx) {
  const custom = getCustomTemplates();
  custom.splice(idx, 1);
  saveCustomTemplates(custom);
  renderTemplatesAdmin();
}

function addCustomTemplate() {
  const custom = getCustomTemplates();
  custom.push({id:'custom_'+uid(), icon:'📌', name:'Novo template', desc:'', checklist:[]});
  saveCustomTemplates(custom);
  renderTemplatesAdmin();
}

function duplicateTemplate(id) {
  const base = TEMPLATES.find(t=>t.id===id);
  if (!base) return;
  const custom = getCustomTemplates();
  custom.push({
    id: 'custom_'+uid(),
    icon: base.icon,
    name: base.name + ' (cópia)',
    desc: base.desc,
    checklist: [],
    baseId: base.id,
  });
  saveCustomTemplates(custom);
  adminTab('templates');
  showToast('Template duplicado — agora edite abaixo', '#3ecf8e');
  setTimeout(() => {
    const list = document.getElementById('admin-templates-list');
    if (list) list.scrollTop = list.scrollHeight;
  }, 100);
}

function resetTemplate(id) {
  const custom = getCustomTemplates().filter(t => t.id !== id);
  saveCustomTemplates(custom);
  renderTemplatesAdmin();
  showToast('Template restaurado ao padrão', '#10b981');
}

function saveTemplateEditorFull(id) {
  const icon = document.getElementById('te-icon')?.value?.trim() || '📋';
  const name = document.getElementById('te-name')?.value?.trim();
  const desc = document.getElementById('te-desc')?.value?.trim() || '';
  const clRaw = document.getElementById('te-checklist')?.value || '';
  const checklist = clRaw.split('\n').map(l=>l.trim()).filter(Boolean);

  if (!name) { showToast('Insira o nome do template', '#ef4444'); return; }

  const custom = getCustomTemplates();
  const existingIdx = custom.findIndex(t => t.id === id);

  const saved = {
    id,
    icon, name, desc, checklist,
    tplData: JSON.parse(JSON.stringify(tplData)),
    isOverride: true,
  };

  if (existingIdx >= 0) custom[existingIdx] = saved;
  else custom.push(saved);

  saveCustomTemplates(custom);
  currentTemplate = null; tplData = {};
  closePanel();
  adminTab('templates');
  showToast('Template salvo', '#3ecf8e');
}



/* PERSISTENCE */
let _syncPending = false;
let _syncRetryTimer = null;

function setSyncStatus(status) {
  // status: 'ok' | 'pending' | 'error'
  const el = document.getElementById('storage-info');
  if (!el) return;
  const kb = (new Blob([localStorage.getItem(STORAGE_KEY)||'']).size/1024).toFixed(1);
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const icons = {ok:'☁️✅', pending:'☁️⏳', error:'☁️❌'};
  const local = '💾 '+t+' · '+kb+' KB';
  el.textContent = _db ? local+' · '+(icons[status]||'☁️') : local;
  el.title = status==='error' ? 'Falha no sync — tentando novamente em 5s' :
             status==='pending' ? 'Sincronizando...' : 'Sincronizado com banco de dados';
}

async function syncToSupabase() {
  if (!_db) return;
  try {
    setSyncStatus('pending');
    const {error} = await _db.from('nordmann_data').upsert(
      {key:'campaigns', payload:JSON.stringify(campaigns), updated_at:new Date().toISOString()},
      {onConflict:'key'}
    );
    if (error) throw error;
    setSyncStatus('ok');
    _syncPending = false;
    if (_syncRetryTimer) { clearTimeout(_syncRetryTimer); _syncRetryTimer = null; }
  } catch(e) {
    setSyncStatus('error');
    _syncPending = true;
    // Retry in 5 seconds
    if (_syncRetryTimer) clearTimeout(_syncRetryTimer);
    _syncRetryTimer = setTimeout(syncToSupabase, 5000);
  }
}

function saveData() {
  // Always save to localStorage first — immediate, never fails
  localStorage.setItem(STORAGE_KEY, JSON.stringify(campaigns));
  updateStorageInfo();
  // Sync to Supabase with retry
  syncToSupabase();
}

async function loadData() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) campaigns = JSON.parse(s); } catch(e) {}
  if (_db) {
    try {
      const {data,error} = await _db.from('nordmann_data').select('payload').eq('key','campaigns').single();
      if (!error && data?.payload) {
        const r = JSON.parse(data.payload);
        if (Array.isArray(r) && r.length >= campaigns.length) { campaigns = r; localStorage.setItem(STORAGE_KEY,JSON.stringify(r)); }
      }
    } catch(e) {}
  }
}

function updateStorageInfo() {
  const el = document.getElementById('storage-info');
  if (!el) return;
  const kb = (new Blob([localStorage.getItem(STORAGE_KEY)||'']).size/1024).toFixed(1);
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  el.textContent = '💾 '+t+' · '+kb+' KB'+(_db?' · ☁️':'');
}

function exportBackup() {
  const blob = new Blob([JSON.stringify({v:2,campaigns,members:MEMBERS},null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'nordmann-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  showToast('Backup exportado','#3ecf8e');
}

function importBackup(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.campaigns) { campaigns = d.campaigns; saveData(); }
      if (d.members)   { MEMBERS = d.members; saveMembers(); updateSidebarMembers(); }
      if (currentView==='kanban') renderKanban();
      showToast('Backup importado','#3ecf8e');
    } catch(err) { showToast('Arquivo inválido','#ef4444'); }
  };
  r.readAsText(file);
}

function confirmReset() {
  if (!confirm('Apagar TODOS os dados? Esta ação não pode ser desfeita.')) return;
  campaigns = []; saveData();
  if (currentView==='kanban') renderKanban();
  showToast('Dados resetados','#ef4444');
}

/* HELPERS */
function getCampaign(id) { return campaigns.find(c => c.id===id); }

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s+'T00:00:00');
  return d.getDate().toString().padStart(2,'0')+'/'+((d.getMonth()+1)).toString().padStart(2,'0');
}

function formatDue(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function calcProgress(c) {
  const subs = c.subtasks||[];
  const done = subs.filter(s=>s.status==='Concluído').length;
  return {done, total:subs.length, pct: subs.length ? Math.round(done/subs.length*100) : 0};
}

function isLate(s) {
  return s.due && s.status!=='Concluído' && new Date(s.due) < new Date();
}

function isBlocked(s, c) {
  if (!s.dep) return false;
  const dep = (c.subtasks||[]).find(x=>x.id===s.dep);
  return dep && dep.status!=='Concluído';
}

function typeTag(type) {
  const c = TYPE_COLOR[type]||{color:'#888',bg:'rgba(136,136,136,.1)'};
  return '<span class="type-tag" style="color:'+c.color+';background:'+c.bg+'">'+type+'</span>';
}

function urgBadge(u) {
  const c = URG_COLOR[u]||{color:'#888',bg:'#eee'};
  return '<span class="urgency-badge" style="color:'+c.color+';background:'+c.bg+'">'+u+'</span>';
}

function avatarHtml(m, size) {
  size = size||20;
  if (!m) return '';
  const content = m.avatar ? '<img src="'+m.avatar+'" style="width:100%;height:100%;object-fit:cover">' : m.initials;
  return '<div class="mini-avatar" style="width:'+size+'px;height:'+size+'px;background:'+m.color+'">'+content+'</div>';
}

function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
document.addEventListener('input', e => { if (e.target.tagName==='TEXTAREA') autoResize(e.target); });

function showToast(msg, color) {
  const t = document.getElementById('toast');
  const d = document.getElementById('toast-dot');
  const m = document.getElementById('toast-msg');
  d.style.background = color||'#7c6af7'; m.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2500);
}

function toggleSubtask(campId, subId) {
  const c = getCampaign(campId); if (!c) return;
  const s = (c.subtasks||[]).find(x=>x.id===subId); if (!s) return;
  s.status = s.status==='Concluído' ? 'Pendente' : 'Concluído';
  if ((c.subtasks||[]).every(x=>x.status==='Concluído') && c.status!=='Concluído') c.status='Concluído';
  saveData();
  if (currentView==='kanban') renderKanban();
  if (currentView==='personal') renderPersonal();
  if (currentView==='overview') renderOverview();
  if (editingCampId === campId) openCampaignDetail(campId);
}

/* KANBAN */
function renderKanbanFilters() {
  const chips = document.getElementById('topbar-chips');
  let html = '';
  TYPES.forEach(t => {
    const on = kanbanFilter.type.includes(t);
    html += '<button class="chip '+(on?'active':'')+'" onclick="toggleKanbanFilter(\'type\',\''+t+'\')">'+t+'</button>';
  });
  html += '<div style="width:0.5px;height:16px;background:var(--border);align-self:center;flex-shrink:0;margin:0 2px"></div>';
  MEMBERS.forEach(m => {
    const on = kanbanFilter.member.includes(m.id);
    html += '<button class="chip '+(on?'active':'')+'" onclick="toggleKanbanFilter(\'member\',\''+m.id+'\')">'+m.name+'</button>';
  });
  chips.innerHTML = html;
}

function toggleKanbanFilter(key, val) {
  const arr = kanbanFilter[key];
  const idx = arr.indexOf(val);
  if (idx===-1) arr.push(val); else arr.splice(idx,1);
  renderKanbanFilters(); renderKanban();
}

function renderKanban() {
  const board = document.getElementById('kanban-board');
  board.innerHTML = '';
  let filtered = campaigns;
  if (kanbanFilter.type.length) filtered = filtered.filter(c=>kanbanFilter.type.includes(c.type));
  if (kanbanFilter.member.length) filtered = filtered.filter(c=>kanbanFilter.member.includes(c.owner)||c.participants.some(p=>kanbanFilter.member.includes(p)));

  STATUSES.forEach(status => {
    const sc = STATUS_COLOR[status];
    const cols = filtered.filter(c=>c.status===status);
    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.innerHTML = '<div class="kanban-col-header"><div class="col-dot" style="background:'+sc.dot+'"></div><span class="col-title">'+status+'</span><span class="col-count">'+cols.length+'</span></div>'+
      '<div class="kanban-cards" id="col-'+status.replace(/\s/g,'_')+'"'+
      ' ondragover="dragOver(event,\''+status+'\')"'+
      ' ondragleave="dragLeave(event)"'+
      ' ondrop="dropCard(event,\''+status+'\')"'+
      '></div>';
    board.appendChild(col);
    const cardsEl = col.querySelector('.kanban-cards');
    if (!cols.length) { cardsEl.innerHTML='<div class="empty-col">Sem campanhas</div>'; return; }
    cols.forEach(c => { cardsEl.insertAdjacentHTML('beforeend', renderCampaignCard(c)); });
  });
}

function renderCampaignCard(c) {
  const prog = calcProgress(c);
  const owner = getMember(c.owner);
  const progColor = prog.pct===100?'var(--c-conteudo)':prog.pct>50?'var(--c-tarefa)':'var(--c-campanha)';
  const cc = c.comments?.length||0;
  const isSelected = selectedCards.has(c.id);
  return '<div class="campaign-card'+(isSelected?' selected':'')+'" id="card-'+c.id+'"' +
    ' draggable="true"' +
    ' ondragstart="dragStart(event,this)"' +
    ' ondragend="dragEnd(event)"' +
    ' onclick="cardClick(event,\''+c.id+'\')">' +
    '<div class="card-checkbox'+(isSelected?' checked visible':'')+'" onclick="event.stopPropagation();toggleCardSelection(\''+c.id+'\')">' +
      (isSelected?'<svg width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="#fff" stroke-width="2"><path d="M1 4l2 2 4-4"/></svg>':'')+
    '</div>'+
    '<div class="card-header"><span class="card-name">'+c.name+'</span>'+typeTag(c.type)+'</div>'+
    '<div class="card-meta"><div class="card-member">'+avatarHtml(owner,18)+'<span>'+(owner?owner.name:'')+'</span></div>'+
    '<span class="card-date">'+formatDate(c.endDate)+'</span></div>'+
    '<div class="progress-label"><span>'+prog.pct+'%</span><span style="display:flex;gap:8px"><span>'+prog.done+'/'+prog.total+'</span>'+(cc?'<span class="comment-count">💬 '+cc+'</span>':'')+'</span></div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+prog.pct+'%;background:'+progColor+'"></div></div>'+
    '</div>';
}

/* -- REGRAS AUTOMÁTICAS DE STATUS -- */
function applyStatusRules(c, oldStatus, newStatus) {
  if (!c) return;

  // -- Em planejamento → cria UMA tarefa "Preencher briefing: [nome]" para o responsável --
  // Ao clicar, abre o formulário de edição da campanha (não uma subtarefa comum)
  if (newStatus === 'Em planejamento' && oldStatus !== 'Em planejamento') {
    const jaTemPlanning = (c.subtasks||[]).some(s=>s._auto==='planning');
    if (!jaTemPlanning) {
      if (!c.subtasks) c.subtasks = [];
      c.subtasks.push({
        id: uid(),
        title: 'Preencher briefing: ' + c.name,
        canal: 'Geral',
        urgency: 'Importante',
        owner: c.owner,
        due: '',
        status: 'Pendente',
        dep: null, checklist: [],
        _auto: 'planning',
        _openEdit: true, // flag: clicar abre edição da campanha
      });
    }
  }

  // -- Em andamento → remove tarefa de briefing e distribui para membros --
  if (newStatus === 'Em andamento' && oldStatus !== 'Em andamento') {
    c.subtasks = (c.subtasks||[]).filter(s => s._auto !== 'planning');

    const jaCriou = (c.subtasks||[]).some(s=>s._auto==='checklist');
    if (!jaCriou) { // distribui para qualquer campanha, com ou sem template
      // Check for custom override checklist first
      const customTpls = getCustomTemplates();
      const customTpl = customTpls.find(t => t.id === c.templateType);
      const customChecklist = customTpl?.checklist || [];

      if (customChecklist.length > 0) {
        // Use custom template checklist — assign to campaign owner
        customChecklist.forEach(item => {
          c.subtasks.push({
            id: uid(), title: item,
            canal: 'Geral', urgency: 'Normal',
            owner: c.owner, due: '',
            status: 'Pendente', dep: null, checklist: [],
            _auto: 'checklist',
          });
        });
      } else if (c.templateData?.checklistsMembro) {
        // Use template data checklist per member (campanhas template)
        const clm = c.templateData.checklistsMembro;
        Object.entries(clm).forEach(([nome, itens]) => {
          // Try exact match first, then case-insensitive
          const m = MEMBERS.find(x=>x.name===nome) ||
                    MEMBERS.find(x=>x.name.toLowerCase()===nome.toLowerCase());
          if (!m) {
            // Member not found — create task assigned to campaign owner
            (itens||[]).forEach(it => {
              c.subtasks.push({
                id: uid(), title: it.texto || nome + ' — item',
                canal: 'Geral', urgency: 'Normal',
                owner: c.owner, due: '',
                status: 'Pendente', dep: null, checklist: [],
                _auto: 'checklist',
              });
            });
            return;
          }
          (itens||[]).forEach(it => {
            c.subtasks.push({
              id: uid(), title: it.texto || nome + ' — item',
              canal: 'Geral', urgency: 'Normal',
              owner: m.id, due: '',
              status: it.done ? 'Concluído' : 'Pendente',
              dep: null, checklist: [],
              _auto: 'checklist',
            });
          });
        });
      } else {
        // Sem checklist definido — usa CL_DEFAULTS para membros que participam
        // ou cria tarefa genérica para cada participante
        const participantes = c.participants || [c.owner];
        let criouAlguma = false;

        participantes.forEach(memberId => {
          if (!memberId) return;
          const m = MEMBERS.find(x => x.id === memberId);
          if (!m) return;
          // Check if CL_DEFAULTS has tasks for this member name
          const defaultItems = CL_DEFAULTS[m.name] || [];
          if (defaultItems.length > 0) {
            defaultItems.forEach(item => {
              c.subtasks.push({
                id: uid(), title: item,
                canal: 'Geral', urgency: 'Normal',
                owner: memberId, due: '',
                status: 'Pendente', dep: null, checklist: [],
                _auto: 'checklist',
              });
            });
            criouAlguma = true;
          }
        });

        // If no CL_DEFAULTS matched, create one generic task per participant
        if (!criouAlguma) {
          participantes.forEach(memberId => {
            if (!memberId) return;
            c.subtasks.push({
              id: uid(), title: 'Executar: ' + c.name,
              canal: 'Geral', urgency: 'Normal',
              owner: memberId, due: '',
              status: 'Pendente', dep: null, checklist: [],
              _auto: 'checklist',
            });
          });
        }
      }
    }
  }
}

function c_updateStatus(id, status) {
  const c = getCampaign(id); if (!c) return;
  const oldStatus = c.status;
  c.status = status;
  applyStatusRules(c, oldStatus, status);
  saveData();
  closePanel();
  renderKanban();
  renderPersonal(); // sempre — regras de status afetam painéis de todos os membros
  if (currentView==='overview') renderOverview();
  showToast('Status: ' + status, '#7c6af7');
}

function toggleSubtaskDetail(campId, subId) {
  toggleSubtask(campId, subId);
  openCampaignDetail(campId);
  if (currentView==='kanban') renderKanban();
  else if (currentView==='personal') renderPersonal();
}

function addSubtaskToDetail(campId) {
  const c = getCampaign(campId); if (!c) return;
  const title = prompt('Título da subtarefa:'); if (!title?.trim()) return;
  if (!c.subtasks) c.subtasks=[];
  c.subtasks.push({
    id:uid(), title:title.trim(), canal:'Geral', urgency:'Normal',
    owner:c.owner, due:'', status:'Pendente', checklist:[], dep:null,
  });
  saveData(); openCampaignDetail(campId);
}

function addDetailComment(campId) {
  const c = getCampaign(campId); if (!c) return;
  const inp = document.getElementById('detail-comment-input-'+campId);
  const text = inp?.value?.trim(); if (!text) return;
  if (!c.comments) c.comments=[];
  const author = window.currentUser?.name||'Equipe';
  c.comments.push({author, text, at:new Date().toISOString()});
  inp.value='';
  saveData();
  // Refresh comment list
  const list = document.getElementById('detail-comments-'+campId);
  if (list) {
    list.innerHTML = c.comments.map(cm=>{
      const m = MEMBERS.find(x=>x.name===cm.author);
      const av = (m&&m.avatar)?'<img src="'+m.avatar+'" style="width:100%;height:100%;object-fit:cover">':(m?m.initials:(cm.author||'?')[0]);
      const bg = m?m.color:'#888';
      const dt = new Date(cm.at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return '<div class="comment-item"><div class="comment-avatar" style="background:'+bg+'">'+av+'</div>'+
        '<div><div class="comment-meta">'+cm.author+' <span>'+dt+'</span></div><div class="comment-text">'+cm.text+'</div></div></div>';
    }).join('');
    list.scrollTop = list.scrollHeight;
  }
  if (currentView==='kanban') renderKanban();
}

/* TEMPLATE DETAIL RENDERER */
function renderTemplateDetail(c) {
  const t = c.templateType;
  const d = c.templateData||{};
  if (t==='campanhas')   return renderTplCampanhasDetail(c,d);
  if (t==='publicacoes') return renderTplPublicacoesDetail(c,d);
  if (t==='email')       return renderTplEmailDetail(c,d);
  if (t==='demanda')     return renderTplDemandaDetail(c,d);
  return '';
}

function tdField(label,val,full){
  if(!val&&val!==0) return '';
  return '<div class="td-field'+(full?'':'')+'" style="margin-bottom:8px"><span class="td-label">'+label+'</span><div class="td-value">'+(val||'<span class="td-value muted">—</span>')+'</div></div>';
}
function tdRow(fields){ // fields: [[label,val]]
  const cols = fields.filter(f=>f[1]);
  if(!cols.length) return '';
  return '<div class="td-row">'+cols.map(f=>tdField(f[0],f[1])).join('')+'</div>';
}

    ).join('')+'</div>' : '';

  const membrosFixos = ['Eric','Giovana','Bia','Tiago'];

  const clMembrosHtml = membrosFixos.map(nome=>{

    tdField('Cronograma',esc(d.cronograma))+

  (clEncHtml?'<div class="td-section"><div class="td-section-title">🔒 Encerramento</div>'+clEncHtml+'</div>':'');

/* -- Toggle checklists dentro do detalhe -- */
function tplDetailClToggle(campId, path, idx) {
  const c = getCampaign(campId); if(!c||!c.templateData) return;
  const parts = path.split('.');
  let obj = c.templateData;
  for (let i=0;i<parts.length-1;i++) { if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]]; }
  const arr = obj[parts[parts.length-1]];
  if (arr&&arr[idx]) arr[idx].done=!arr[idx].done;
  saveData(); openCampaignDetail(campId);
}
function tplDetailStepToggle(campId, membId, idx) {
  const c = getCampaign(campId); if(!c||!c.templateData) return;
  const passos = c.templateData.blocosMembros?.[membId]?.passos;
  if(passos&&passos[idx]) passos[idx].done=!passos[idx].done;
  saveData(); openCampaignDetail(campId);
}

function updateCampaign(id) {
  const c = getCampaign(id); if (!c) return;
  const name = document.getElementById('f-name')?.value?.trim();
  if (!name) { alert('Insira o nome'); return; }
  const participants = [...document.querySelectorAll('#multi-participants .multi-item.selected')].map(el=>el.dataset.val);
  const canais = [...document.querySelectorAll('#multi-canais .multi-item.selected')].map(el=>el.dataset.canal||el.textContent);
  // Collect subtasks from manual forms (keep existing _auto subtasks)
  const manualSubs = subForms.map(sf=>({
    id:sf.id,
    title:document.getElementById('sf-title-'+sf.id)?.value?.trim()||'Subtarefa',
    canal:document.getElementById('sf-canal-'+sf.id)?.value||'Geral',
    urgency:document.getElementById('sf-urg-'+sf.id)?.value||'Normal',
    owner:document.getElementById('sf-owner-'+sf.id)?.value||'',
    due:document.getElementById('sf-due-'+sf.id)?.value||'',
    dep:document.getElementById('sf-dep-'+sf.id)?.value||null,
    note:document.getElementById('sf-note-'+sf.id)?.value?.trim()||'',
    status:'Pendente', checklist:[],
  }));
  // Keep existing auto subtasks, replace manual ones
  const autoSubs = (c.subtasks||[]).filter(s=>s._auto);
  c.name = name;
  c.type = document.getElementById('f-type').value;
  c.status = document.getElementById('f-status').value;
  c.startDate = document.getElementById('f-start').value;
  c.endDate = document.getElementById('f-end').value;
  c.endTime = document.getElementById('f-end-time')?.value||'';
  c.owner = document.getElementById('f-owner').value;
  c.participants = participants.length ? participants : [c.owner];
  c.canais = canais;
  c.driveLink = document.getElementById('f-drive')?.value?.trim()||'';
  c.description = document.getElementById('f-desc')?.value?.trim()||'';
  c.templateType = currentTemplate||null;
  c.templateData = currentTemplate ? JSON.parse(JSON.stringify(tplData)) : null;
  const oldStatus = c.status; // status before update
  c.subtasks = [...autoSubs, ...manualSubs];
  subForms=[]; currentTemplate=null; tplData={};
  // Apply status rules if status changed
  const newStatus = document.getElementById('f-status').value;
  if (newStatus !== oldStatus) {
    c.status = newStatus;
    applyStatusRules(c, oldStatus, newStatus);
  }
  saveData();
  renderKanban();
  renderPersonal();
  closePanel();
  showToast('Campanha atualizada','#3ecf8e');
}

function selectTemplate(id) {
  if (currentTemplate === id) { currentTemplate = null; tplData = {}; }
  else { currentTemplate = id; tplData = {}; }
  document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('active'));
  if (currentTemplate) {
    document.querySelector('.tpl-card[onclick="selectTemplate(\''+currentTemplate+'\')"]')?.classList.add('active');
    renderTplFields();
  } else {
    document.getElementById('tpl-fields-container').innerHTML='';
  }
}

/* -- TEMPLATE HELPER FUNCTIONS -- */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function autoResizeAll(){
  document.querySelectorAll('.form-textarea').forEach(t=>{t.style.height='auto';t.style.height=t.scrollHeight+'px';});
}

function tplDynAdd(key, item) {
  if (!tplData[key]) tplData[key]=[];
  tplData[key].push(item);
  renderTplFields();
}
function tplDynRemove(key, idx) {
  if (!tplData[key]) return;
  tplData[key].splice(idx,1);
  renderTplFields();
}

function tplClToggle(path, idx) {
  const parts = path.split('.');
  let obj = tplData;
  for (let i=0;i<parts.length-1;i++) { if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]]; }
  const arr = obj[parts[parts.length-1]];
  if (arr&&arr[idx]) arr[idx].done=!arr[idx].done;
  renderTplFields();
}
function tplClText(path, idx, val) {
  const parts = path.split('.');
  let obj = tplData;
  for (let i=0;i<parts.length-1;i++) { if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]]; }
  const arr = obj[parts[parts.length-1]];
  if (arr&&arr[idx]) arr[idx].texto=val;
}
function tplClRemove(path, idx) {
  const parts = path.split('.');
  let obj = tplData;
  for (let i=0;i<parts.length-1;i++) { if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]]; }
  const arr = obj[parts[parts.length-1]];
  if (arr) arr.splice(idx,1);
  renderTplFields();
}
function tplClAdd(path, inputEl, forceEmpty) {
  const val = inputEl ? inputEl.value.trim() : '';
  const parts = path.split('.');
  let obj = tplData;
  for (let i=0;i<parts.length-1;i++) { if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]]; }
  const key = parts[parts.length-1];
  if (!obj[key]) obj[key]=[];
  obj[key].push({texto: forceEmpty?'':val, done:false});
  renderTplFields();
}

function tplSlideAdd() {
  if (!tplData.slides) tplData.slides=[];
  tplData.slides.push({pretitulo:'',titulo:'',subtitulo:'',cta:'',entrelinha:''});
  renderTplFields();
}
function tplSlideRemove(idx) {
  if (tplData.slides) tplData.slides.splice(idx,1);
  renderTplFields();
}

function tplBannerUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { tplData.gioBannerB64=ev.target.result; renderTplFields(); };
  reader.readAsDataURL(file);
}

function tplToggleMembro(membId, checked) {
  if (!tplData.membrosAtivos) tplData.membrosAtivos=[];
  if (!tplData.blocosMembros) tplData.blocosMembros={};
  if (checked) {
    if (!tplData.membrosAtivos.includes(membId)) tplData.membrosAtivos.push(membId);
    if (!tplData.blocosMembros[membId]) tplData.blocosMembros[membId]={passos:[]};
  } else {
    tplData.membrosAtivos=tplData.membrosAtivos.filter(x=>x!==membId);
  }
  renderTplFields();
}
function tplStepAdd(membId) {
  if (!tplData.blocosMembros) tplData.blocosMembros={};
  if (!tplData.blocosMembros[membId]) tplData.blocosMembros[membId]={passos:[]};
  tplData.blocosMembros[membId].passos.push({id:uid(),titulo:'',urgencia:'Normal',prazo:'',dep:'',done:false});
  renderTplFields();
}
function tplStepRemove(membId, idx) {
  if (tplData.blocosMembros&&tplData.blocosMembros[membId]) {
    tplData.blocosMembros[membId].passos.splice(idx,1);
  }
  renderTplFields();
}

function toggleMulti(el) {
  el.classList.toggle('selected');
  // Se é participante e template campanhas está ativo, sincroniza checklist
  if (el.closest('#multi-participants') && currentTemplate==='campanhas') {
    syncCampanhasChecklist();
  }
}

function syncCampanhasChecklist() {
  // Pega participantes selecionados
  const selected = [...document.querySelectorAll('#multi-participants .multi-item.selected')].map(el=>{
    const m = MEMBERS.find(x=>x.id===el.dataset.val);
    return m?.name;
  }).filter(Boolean);

  // Para cada membro nos defaults, verifica se está selecionado
  const membrosComDefault = Object.keys(CL_DEFAULTS);
  membrosComDefault.forEach(nome => {
    const isSelected = selected.includes(nome);
    if (!tplData.checklistsMembro) tplData.checklistsMembro = {};
    if (isSelected && (!tplData.checklistsMembro[nome] || !tplData.checklistsMembro[nome].length)) {
      // Adiciona checklist padrão
      tplData.checklistsMembro[nome] = CL_DEFAULTS[nome].map(t=>({texto:t,done:false}));
    } else if (!isSelected && tplData.checklistsMembro[nome]) {
      // Remove checklist
      delete tplData.checklistsMembro[nome];
    }
  });

  // Re-renderiza os campos do template se visível
  const container = document.getElementById('tpl-fields-container');
  if (container && currentTemplate==='campanhas') renderTplFields();
}
